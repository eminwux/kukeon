# CellBlueprint for one-shot Claude Code prompts.
#
# Apply once into the daemon:
#
#   sudo kuke apply -f docs/examples/claude-code/blueprint.yaml
#
# Then materialize a fresh cell each time:
#
#   sudo kuke run --from-blueprint claude-code \
#       --param PROMPT="explain the kukeon architecture in one sentence" --rm
#
# Each `kuke run --from-blueprint` produces a cell named `claude-code-<6hex>`,
# substitutes ${IMAGE} / ${PROMPT}, and attaches to the `work` container. The
# onInit script runs `claude --print "${PROMPT}"` once and exits, so the
# attach loop closes and `--rm` reclaims the cell.
#
# For a name-stable variant pinned to a particular cell name, pass --name X
# to the same fused form (`kuke run --from-blueprint claude-code --name X`).
# For a recurring workflow whose values + slot fills live in the daemon, wrap
# this Blueprint in a kind: CellConfig and use
# `kuke run --from-config <name>` instead.
apiVersion: v1beta1
kind: CellBlueprint
metadata:
  name: claude-code
  realm: default
  space: default
  stack: default
spec:
  parameters:
    - name: IMAGE
      description: "Claude Code image reference"
      default: docker.io/library/claude-code:latest
    - name: PROMPT
      description: "Prompt passed to `claude --print`"
      required: true
  cell:
    autoDelete: true
    tty:
      default: work
    containers:
      - id: root
        root: true
        image: docker.io/library/busybox:latest
        command: sleep
        args:
          - "infinity"
      - id: work
        attachable: true
        image: ${IMAGE}
        command: /bin/bash
        workingDir: /home/claude
        tty:
          prompt: "claude> "
          onInit:
            - script: |
                claude --print "${PROMPT}" && exit
