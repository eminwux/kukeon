name: Release Build
on:
  push:
    tags:
      - "v[0-9].[0-9]+.[0-9]+"

jobs:
  kukeon_binaries:
    name: Create Release
    env:
      KUKEON_VERSION: ${{ github.ref_name }}
      KUKEON_REGISTRY: ghcr.io
      KUKEON_IMAGE_NAME: ${{ github.repository_owner }}/kukeon
      KUKEON_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/kukeon
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # kukebuild lives in its own Go module (cmd/kukebuild/go.mod, issue #655)
      # pinned to a newer Go than the root module; `make release-build-kukebuild`
      # cds into that module and lets GOTOOLCHAIN auto-fetch the pinned
      # toolchain. setup-go with go-version-file: go.mod gives a known base Go
      # for that auto-fetch — mirrors the test.yaml job's proven pattern.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build artifacts
        run: |
          make release-build \
            KUKEON_VERSION=$KUKEON_VERSION \
            KUKEON_IMAGE_REPO=$KUKEON_IMAGE_REPO

      # kukebuild is the docker-free image builder `kuke build` execs (embeds
      # BuildKit as a library, writes straight into the realm's containerd
      # namespace). It is built from its own Go module via a separate target so
      # the installer can ship it on PATH alongside `kuke` — without it a fresh
      # installer user hits errdefs.ErrKukebuildNotFound on `kuke build`
      # (issue #1227).
      - name: Build kukebuild artifacts
        run: |
          make release-build-kukebuild

      # The one-line installer (https://kukeon.io/install.sh, issue #62)
      # downloads the per-arch `.sha256` companion file and verifies it
      # before placing the binary on the user's PATH. Generate one
      # alongside every release asset so the verification step has
      # something to check against.
      - name: Generate sha256 checksums for release assets
        run: |
          for f in kuke-linux-amd64 kuke-linux-arm64 \
                   kukeond-linux-amd64 kukeond-linux-arm64 \
                   kukepause-linux-amd64 kukepause-linux-arm64 \
                   kukebuild-linux-amd64 kukebuild-linux-arm64; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create Github Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
          ./kuke-linux-amd64 ./kuke-linux-arm64 \
          ./kukeond-linux-amd64 ./kukeond-linux-arm64 \
          ./kukepause-linux-amd64 ./kukepause-linux-arm64 \
          ./kukebuild-linux-amd64 ./kukebuild-linux-arm64 \
          ./kuke-linux-amd64.sha256 ./kuke-linux-arm64.sha256 \
          ./kukeond-linux-amd64.sha256 ./kukeond-linux-arm64.sha256 \
          ./kukepause-linux-amd64.sha256 ./kukepause-linux-arm64.sha256 \
          ./kukebuild-linux-amd64.sha256 ./kukebuild-linux-arm64.sha256 \
          --title "${GITHUB_REF#refs/tags/}" \
          --generate-notes \
          --notes "Container images (multi-arch: linux/amd64, linux/arm64):
          - ${KUKEON_IMAGE_REPO}:${KUKEON_VERSION}
          - ${KUKEON_IMAGE_REPO}:latest
          "

  kukeon_images:
    name: Build Images
    env:
      KUKEON_VERSION: ${{ github.ref_name }}
      KUKEON_REGISTRY: ghcr.io
      KUKEON_IMAGE_NAME: ${{ github.repository_owner }}/kukeon
      KUKEON_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/kukeon
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.KUKEON_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract kukeon metadata
        id: meta-kukeon
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.KUKEON_REGISTRY }}/${{ env.KUKEON_IMAGE_NAME }}
          # Publish a v-prefixed semver tag (e.g. v1.2.3) so the tag matches
          # config.Version baked into the kuke binary; `kuke init` resolves
          # ghcr.io/<owner>/kukeon:<config.Version> at runtime.
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=kukeon
            org.opencontainers.image.version=${{ env.KUKEON_VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push kukeon Docker image
        id: push-kukeon
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-kukeon.outputs.tags }}
          labels: ${{ steps.meta-kukeon.outputs.labels }}
          build-args: |
            VERSION=${{ env.KUKEON_VERSION }}
          platforms: linux/amd64,linux/arm64

      - name: Generate kukeon artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.KUKEON_REGISTRY }}/${{ env.KUKEON_IMAGE_NAME }}
          subject-digest: ${{ steps.push-kukeon.outputs.digest }}
          push-to-registry: true
